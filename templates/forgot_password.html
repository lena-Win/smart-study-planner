{% extends "base.html" %}
{% block extra_head %}
<style>
@keyframes floatSlow {
0% { transform: translateY(0px) translateX(0px); }
50% { transform: translateY(-25px) translateX(12px); }
100% { transform: translateY(0px) translateX(0px); }
}
.orb{
animation: floatSlow 10s ease-in-out infinite;
}
</style>
{% endblock %}
{% block content %}
<form method="POST" class="glass w-full max-w-md rounded-3xl p-8">
<div class="flex items-center justify-center min-h-screen">
<h1 class="text-3xl font-extrabold mb-2">
Reset Password
</h1>
<p class="text-gray-600 mb-6">
We'll send you a secure reset link
</p>
<input
name="email"
placeholder="Email"
class="w-full p-4 rounded-2xl bg-white/60 border border-white/40 mb-5 outline-none">
<button 
class="w-full py-4 rounded-2xl bg-gray-900 text-white font-semibold">
Send Reset Link
</button>
<a href="/login" class="block mt-5 text-sm font-semibold">
Back to login
</a>
</form>
</div>
{% endblock %}
