<!DOCTYPE html>
<html>
<head>
<title>Analytics</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bh-gray-100 p-8">
<div class="max-w-3xl mx-auto">
<h1 class="text-3xl mx-auto">
User Analytics
</h1>
<div class="grid grid-cols-2 gap-4">
<div class="bg-white p-6 rounded-x1 shadow">
<h2 class="text-1g font-semibold">Visits</h2>
<p class="text-3xl font-bold">{{ visits }}</p>
</div>
<div class="bg-white p-6 rounded-xl shadow">
<h2 class="text-1g font-semibold">Subjects Added</h2>
<p class="text-3xl font-bold">{{ adds }}</p>
</div>
<div class="bg-white p-6 rounded-xl shadow">
<h2 class="text-1g font-semibold">Deleted</h2>
<p class="text-3xl font-bold">{{ deletes }}</p>
</div>
<div class="bg-white p-6 rounded-xl shadow">
<h2 class="text-1g font-semibold">PDF Downloads</h2>
<p class="text-3xl font-bold">{{ downloads }}</p>
</div>
</div>
</div>
</body>
</html>
