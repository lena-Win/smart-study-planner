{% extends "base.html" %}
{% block extra_head %}
<style>
.orb{
position:absolute;
border-radius:9999px;
filter: blur(60px);
opacity:.45;
}
.orb1{
width:240px;
height:240px;
background:#b7dbff;
top:20px;
left:20px;
}
.orb2{
width:260px;
height:260px;
background:#c7f0d3;
right:40px;
bottom:40px;
}
.orb3{
width:180px;
height:180px;
background:#eadcff;
top:45%;
left:45%;
}
@keyframes floatSlow {
0% { transform: translateY(0px) translateX(0px); }
50% { transform: translateY(-25px) translateX(12px); }
100% { transform: translateY(0px) translateX(0px); }
}
.orb{
animation: floatSlow 10s ease-in-out infinite;
}
</style>
{% endblock %}
{% block content %}
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="max-w-6xl mx-auto px-6 py-10 relative z-10">
<div class="glass rounded-3xl p-6 mb-8 flex justify-between items-center">
<div>
<h1 class="text-4xl font-extrabold text-gray-900">
Study Zen Analytics
</h1>
<p class="text-gray-600 mt-2">
Track how users interact with your product.
</p>
</div>
<a href="/">
<button class="px-5 py-3 rounded-full bg-gray-900 text-white hover:opacity-90 transition">
Back Home
</button>
</a>
</div>
<div class="grid md:grid-cols-2 gap-5">
<div class="glass rounded-3xl p-6">
<p class="text-sm text-gray-500">Visits</p>
<p class="text-5xl font-bold mt-2">{{ visits }}</p>
</div>
<div class="glass rounded-3xl p-6">
<p class="text-sm text-gray-500">Subjects Added</p>
<p class="text-5xl font-bold mt-2">{{ adds }}</p>
</div>
<div class="glass rounded-3xl p-6">
<p class="text-sm text-gray-500">Deleted</p>
<p class="text-5xl font-bold mt-2">{{ deletes }}</p>
</div>
<div class="glass rounded-3xl p-6">
<p class="text-sm text-gray-500">PDF Downloads</p>
<p class="text-5xl font-bold mt-2">{{ downloads }}</p>
</div>
</div>
</div>
{% endblock %}
